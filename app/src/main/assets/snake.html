<!DOCTYPE html><html lang='zh'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1.0'><title>贪吃蛇</title><style>*{margin:0;padding:0;box-sizing:border-box}body{background:#1a1a2e;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:sans-serif}.game-container{background:#16213e;border-radius:16px;padding:30px;box-shadow:0 20px 60px rgba(0,0,0,0.5);text-align:center}h1{color:#e94560;margin-bottom:15px;font-size:28px}canvas{background:#0f3460;border-radius:8px;display:block;margin:0 auto 20px;box-shadow:inset 0 0 20px rgba(0,0,0,0.3)}.info{display:flex;justify-content:space-between;color:#eee;font-size:18px;padding:0 10px;margin-bottom:15px}.score{color:#e94560;font-weight:bold}.controls{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}button{background:#e94560;color:#fff;border:none;padding:10px 28px;border-radius:8px;font-size:16px;cursor:pointer;transition:all 0.2s}button:hover{background:#c7364f;transform:scale(1.05)}button.restart{background:#533483}.hint{color:#aaa;font-size:14px;margin-top:10px}</style></head><body><div class='game-container'><h1>🐍 贪吃蛇</h1><canvas id='gameCanvas' width='400' height='400'></canvas><div class='info'><span>分数: <span id='score'>0</span></span><span>最高: <span id='highScore'>0</span></span></div><div class='controls'><button id='restartBtn' class='restart'>重新开始</button></div><p class='hint'>方向键 / WASD级劔 · 空格暂停</p></div><script>const canvas=document.getElementById('gameCanvas'),ctx=canvas.getContext('2d');const grid=20,size=20;let snake=[{x:10,y:10}],food={x:15,y:15},direction={x:1,y:0},nextDirection={x:1,y:0},score=0,highScore=0,gameOver=false,paused=false,gameLoop=null;const scoreEl=document.getElementById('score');const stored=localStorage.getItem('snakeHighScore');if(stored)highScore=parseInt(stored);document.getElementById('highScore').textContent=highScore;function randomFood(){let pos;do{pos={x:Math.floor(Math.random()*grid),y:Math.floor(Math.random()*grid)}}while(snake.some(s=>s.x===pos.x&&s.y===pos.y));food=pos}function reset(){snake=[{x:10,y:10}];direction={x:1,y:0};nextDirection={x:1,y:0};score=0;gameOver=false;paused=false;scoreEl.textContent='0';randomFood();if(gameLoop)clearInterval(gameLoop);gameLoop=setInterval(update,150)}function update(){if(gameOver||paused)return;let head={x:snake[0].x+nextDirection.x,y:snake[0].y+nextDirection.y};if(head.x<0||head.x>=grid||head.y<0||head.y>=grid){gameOver=true;clearInterval(gameLoop);draw();return}if(snake.some(s=>s.x===head.x&&s.y===head.y)){gameOver=true;clearInterval(gameLoop);draw();return}snake.unshift(head);if(head.x===food.x&&head.y===food.y){score+=10;scoreEl.textContent=score;if(score>highScore){document.getElementById('highScore').textContent=score;localStorage.setItem('snakeHighScore',score)}randomFood()}else snake.pop();direction={...nextDirection};draw()}function draw(){ctx.clearRect(0,0,400,400);snake.forEach((s,i)=>{ctx.fillStyle=i===0?'#e94560':'#0f3460';ctx.fillRect(s.x*size,s.y*size,size-2,size-2)});ctx.fillStyle='#f5c518';ctx.fillRect(food.x*size,food.y*size,size-2,size-2);if(gameOver){ctx.fillStyle='rgba(0,0,0,0.6)';ctx.fillRect(0,0,400,400);ctx.fillStyle='#fff';ctx.font='32px sans-serif';ctx.textAlign='center';ctx.fillText('游戏结杝',200,200);ctx.font='18px sans-serif';ctx.fillText('点击重新开始'200,250)}}document.addEventListener('keydown',e=>{switch(e.key){case'ArrowUp':case'w':case'W':if(direction.y!==1)nextDirection={x:0,y:-1};break;case'ArrowDown':case's':case'S':if(direction.y!==-1)nextDirection={x:0,y:1};break;case'ArrowLeft':case'a':case'A':if(direction.x!==1)nextDirection={x:-1,y:0};break;case'ArrowRight':case'd':case'D':if(direction.x!==-1)nextDirection={x:1,y:0};break;case' ':paused=!paused;draw()}e.preventDefault()});document.getElementById('restartBtn').addEventListener('click',reset);reset();</script></body></html>
